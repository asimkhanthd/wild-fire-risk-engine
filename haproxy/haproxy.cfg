# HAProxy configuration for STORCITO API.
# Public traffic enters on :80 inside the HAProxy container and is distributed
# across four STORCITO API containers.

global
    maxconn 50000
    log stdout format raw local0 info
    tune.ssl.default-dh-param 2048

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3

    # Some STORCITO calculations and file transfers can be long-running.
    timeout connect 10s
    timeout client 86400s
    timeout server 86400s
    timeout queue 300s
    timeout http-request 86400s
    timeout http-keep-alive 30s

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
    stats show-legends

frontend storcito_frontend
    bind *:80

    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    acl is_health path /health
    default_backend storcito_backend

backend storcito_backend
    balance leastconn
    option httpchk GET /health
    http-check expect status 200

    timeout queue 120s
    default-server inter 5s fall 3 rise 2 slowstart 60s

    server storcito-api-1 storcito-api-1:8085 check weight 100 maxconn 100
    server storcito-api-2 storcito-api-2:8085 check weight 100 maxconn 100
    server storcito-api-3 storcito-api-3:8085 check weight 100 maxconn 100
    server storcito-api-4 storcito-api-4:8085 check weight 100 maxconn 100

    http-reuse safe
